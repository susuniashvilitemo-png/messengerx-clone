<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MessengerX - Welcome</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .welcome-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; padding: 20px; }
        .x-logo { font-size: 100px; font-weight: 900; background: linear-gradient(135deg, #7c4dff, #ba62f8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .login-btn { width: 100%; max-width: 350px; padding: 18px; border-radius: 15px; border: none; font-size: 16px; font-weight: 600; margin: 8px 0; cursor: pointer; color: white; }
        .blue { background: #5856d6; }
        .dark { background: #1c1c1e; border: 1px solid #333; }
        .guest { color: white; margin-top: 15px; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>
    <div class="welcome-screen">
        <div class="x-logo">X</div>
        <h2 style="margin-bottom: 40px;">Welcome to MessengerX</h2>
        <button class="login-btn blue" onclick="location.href='home.html'">Continue with Email</button>
        <button class="login-btn dark" onclick="location.href='home.html'">Continue with Apple</button>
        <button class="login-btn dark" onclick="location.href='home.html'">Continue with Google</button>
        <p class="guest" onclick="location.href='home.html'">or Continue as guest</p>
    </div>
</body>
</html>
